<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article to Audio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 520px;
      background: #0a0a0a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      overflow-x: hidden;
    }

    .container {
      padding: 20px;
    }

    .header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0, 255, 136, 0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #00ff88, #00d4ff);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #00ff88, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }

    .mode-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .mode-btn {
      background: transparent;
      border: none;
      color: #ffffff;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .mode-btn:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .mode-btn.active {
      background: linear-gradient(135deg, #00ff88, #00d4ff);
      color: #000000;
    }

    .content {
      display: none;
    }

    .content.active {
      display: block;
    }

    .page-info {
      background: rgba(0, 255, 136, 0.05);
      border: 1px solid rgba(0, 255, 136, 0.2);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .page-title {
      font-size: 14px;
      font-weight: 600;
      color: #00ff88;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .page-url {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      word-break: break-all;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .page-meta {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 12px;
      color: #ffffff;
      font-size: 13px;
      transition: all 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: #00ff88;
      background: rgba(255, 255, 255, 0.08);
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #00ff88, #00d4ff);
      color: #000000;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      display: block;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      color: #00ff88;
    }

    .status.error {
      display: block;
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid rgba(255, 0, 0, 0.3);
      color: #ff6b6b;
    }

    .status.loading {
      display: block;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      color: #00d4ff;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-top-color: #000000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .settings {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }

    .settings-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
    }

    .server-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 10px;
      color: #ffffff;
      font-size: 12px;
      font-family: 'Courier New', monospace;
    }

    .footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }

    .footer-link {
      color: #00d4ff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
    }

    .footer-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">🎵</div>
        <div>
          <h1>Article to Audio</h1>
          <div class="subtitle">Convert articles to audio instantly</div>
        </div>
      </div>
    </div>

    <div class="mode-selector">
      <button class="mode-btn active" data-mode="scrape">
        📄 This Page
      </button>
      <button class="mode-btn" data-mode="url">
        🔗 URL
      </button>
    </div>

    <!-- Scrape Mode -->
    <div class="content active" id="scrape-content">
      <div class="page-info" id="page-info">
        <div class="page-title" id="page-title">Loading page info...</div>
        <div class="page-url" id="page-url"></div>
        <div class="page-meta">
          <span id="page-words">- words</span>
        </div>
      </div>

      <button class="btn-primary" id="scrape-btn">
        <span>📥 Add to Library</span>
      </button>

      <button class="btn-secondary" id="scrape-generate-btn">
        ⚡ Generate Audio Now
      </button>
    </div>

    <!-- URL Mode -->
    <div class="content" id="url-content">
      <div class="input-group">
        <label class="input-label">Article URL</label>
        <input
          type="url"
          class="input-field"
          id="url-input"
          placeholder="https://example.com/article"
        >
      </div>

      <button class="btn-primary" id="url-btn" disabled>
        <span>📥 Add to Library</span>
      </button>

      <button class="btn-secondary" id="url-generate-btn" disabled>
        ⚡ Generate Audio Now
      </button>
    </div>

    <div class="status" id="status"></div>

    <div class="settings">
      <div class="settings-row">
        <label class="settings-label">Server URL</label>
      </div>
      <input
        type="text"
        class="server-input"
        id="server-url"
        value="http://localhost:3000"
        placeholder="http://localhost:3000"
      >
    </div>

    <div class="footer">
      <a href="#" class="footer-link" id="open-app">Open App →</a>
    </div>
  </div>

  <script src="scripts/popup.js"></script>
</body>
</html>
